<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>企业资料 · fiveoranges.ai</title>
<style>
  :root {
    --border: #e5e7eb; --muted: #6b7280; --bg: #f9fafb; --card: #fff;
    --accent: #1f6feb; --warn: #c00;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, "Segoe UI", sans-serif;
    background: var(--bg); color: #111;
    margin: 0; padding: 24px;
  }
  .wrap { max-width: 900px; margin: 0 auto; }
  header.page {
    display: flex; align-items: center; gap: 12px; margin-bottom: 24px;
  }
  header.page h1 { font-size: 22px; font-weight: 600; margin: 0; flex: 1; }
  .pill {
    display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 3px;
    font-weight: 500; vertical-align: 2px;
  }
  .pill.role-owner { background: #ede9fe; color: #6d28d9; }
  .pill.role-admin { background: #dbeafe; color: #1e40af; }
  .pill.role-member { background: #f3f4f6; color: #374151; }
  .pill.role-platform_admin { background: #fde68a; color: #92400e; }
  .pill.plan-trial { background: #fef3c7; color: #92400e; }
  .pill.plan-standard { background: #dbeafe; color: #1e40af; }
  .pill.plan-enterprise { background: #dcfce7; color: #15803d; }
  .link { color: var(--muted); font-size: 13px; text-decoration: none; cursor: pointer; }
  .link:hover { color: #111; }

  .card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 24px; margin-bottom: 16px; }
  .card h2 { margin: 0 0 16px 0; font-size: 15px; font-weight: 600; color: #374151; }
  .card .hint { font-size: 12px; color: var(--muted); margin-bottom: 12px; }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px 24px; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .field input, .field select {
    padding: 8px 10px; border: 1px solid var(--border); border-radius: 4px; font-size: 13px;
    background: #fff;
  }
  .field input:disabled, .field select:disabled { background: var(--bg); color: var(--muted); cursor: not-allowed; }
  .form-actions { margin-top: 18px; display: flex; gap: 8px; }
  .btn { padding: 8px 16px; border: 1px solid var(--border); border-radius: 4px; background: #fff; cursor: pointer; font-size: 13px; }
  .btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn.primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn.danger { color: var(--warn); border-color: #fee2e2; }
  .btn.danger:hover { background: #fee2e2; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { padding: 8px 10px; text-align: left; border-bottom: 1px solid var(--border); }
  th { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); font-weight: 500; }
  td.actions { text-align: right; }

  .empty { color: var(--muted); font-size: 13px; padding: 24px; text-align: center; }
  .toast { position: fixed; bottom: 20px; right: 20px; background: #111; color: #fff; padding: 10px 16px; border-radius: 6px; font-size: 13px; opacity: 0; transition: opacity 0.2s; pointer-events: none; }
  .toast.show { opacity: 1; }
  .toast.error { background: var(--warn); }

  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: none; align-items: center; justify-content: center; }
  .modal-bg.show { display: flex; }
  .modal { background: #fff; border-radius: 8px; padding: 24px; width: 380px; }
  .modal h3 { margin: 0 0 16px 0; font-size: 15px; }
  .modal .form-grid { grid-template-columns: 1fr; }
  .role-note { font-size: 12px; color: var(--muted); margin-top: 4px; }
</style>
</head>
<body>

<div class="wrap">
  <header class="page">
    <h1 id="title">加载中…</h1>
    <span id="role-pill"></span>
    <a class="link" href="/">← 返回首页</a>
  </header>

  <div id="content"></div>
</div>

<div class="modal-bg" id="modal-bg"><div class="modal" id="modal"></div></div>
<div class="toast" id="toast"></div>

<script>
const ENTERPRISE_ID = location.pathname.split('/')[2];

const api = (path, opts={}) => fetch(path, { credentials: 'same-origin', ...opts })
  .then(async r => {
    if (r.status === 401) { location.href = '/'; throw new Error('unauth'); }
    if (r.status === 403) {
      document.getElementById('content').innerHTML =
        '<div class="card"><div class="empty">您不是该企业的成员。</div></div>';
      throw new Error('forbidden');
    }
    if (r.status === 404) {
      document.getElementById('content').innerHTML =
        '<div class="card"><div class="empty">企业不存在。</div></div>';
      throw new Error('not found');
    }
    if (!r.ok) {
      const err = await r.json().catch(() => ({ message: 'request failed' }));
      toast(err.message || err.error || `${r.status}`, true);
      throw new Error(err.error || `${r.status}`);
    }
    return r.json();
  });

const state = { me: null, enterprise: null, role: null };

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, ch =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}
function fmtTs(unix) { return unix ? new Date(unix * 1000).toLocaleDateString('zh-CN') : '—'; }
function toast(msg, isErr=false) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.toggle('error', isErr); t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
function val(id) { return document.getElementById(id).value; }
function showModal(html) {
  document.getElementById('modal').innerHTML = html;
  document.getElementById('modal-bg').classList.add('show');
}
function closeModal() { document.getElementById('modal-bg').classList.remove('show'); }
document.getElementById('modal-bg').onclick = e => {
  if (e.target.id === 'modal-bg') closeModal();
};

function canEditProfile() { return state.role === 'owner' || state.role === 'platform_admin'; }
function canManageMembers() { return ['owner', 'admin', 'platform_admin'].includes(state.role); }
function canChangeRoles() { return state.role === 'owner' || state.role === 'platform_admin'; }
function canMintOwner() { return state.role === 'owner' || state.role === 'platform_admin'; }

async function load() {
  state.me = await api('/api/me');
  // Determine role: platform admin acts as such; otherwise look up our row in members.
  state.enterprise = await api(`/api/enterprise/${encodeURIComponent(ENTERPRISE_ID)}`);
  if (state.me.is_platform_admin) {
    state.role = 'platform_admin';
  } else {
    const mine = state.enterprise.members.find(m => m.user_id === state.me.id);
    state.role = mine?.role || null;
  }

  const e = state.enterprise;
  document.getElementById('title').textContent = e.display_name;
  document.getElementById('role-pill').innerHTML = `
    <span class="pill plan-${e.plan}">${e.plan}</span>
    <span class="pill role-${state.role}">您是 ${state.role}</span>
  `;

  renderProfile();
  renderMembers();
}

function renderProfile() {
  const e = state.enterprise;
  const editable = canEditProfile();
  const dis = editable ? '' : ' disabled';
  document.getElementById('content').innerHTML = `
    <div class="card">
      <h2>企业资料</h2>
      <div class="hint">${editable ? '只有 owner 可以保存修改。Plan / 合同 / 状态由 YunWei AI 平台管理员调整。' : '只读 — 联系 owner 修改资料。'}</div>
      <div class="form-grid">
        <div class="field"><label>id</label><input value="${escapeHtml(e.id)}" disabled></div>
        <div class="field"><label>Legal name</label><input id="f-legal" value="${escapeHtml(e.legal_name)}"${dis}></div>
        <div class="field"><label>Display name</label><input id="f-display" value="${escapeHtml(e.display_name)}"${dis}></div>
        <div class="field"><label>Industry</label><input id="f-industry" value="${escapeHtml(e.industry || '')}"${dis}></div>
        <div class="field"><label>Region</label><input id="f-region" value="${escapeHtml(e.region || '')}"${dis}></div>
        <div class="field"><label>Size tier</label>
          <select id="f-size"${dis}>
            ${['','small','medium','large'].map(s => `<option value="${s}" ${s===(e.size_tier||'')?'selected':''}>${s||'(未填)'}</option>`).join('')}
          </select>
        </div>
        <div class="field"><label>Tax ID</label><input id="f-tax" value="${escapeHtml(e.tax_id || '')}"${dis}></div>
        <div class="field"><label>Billing email</label><input id="f-billing" value="${escapeHtml(e.billing_email || '')}"${dis}></div>
        <div class="field"><label>Plan (只读)</label><input value="${escapeHtml(e.plan)}" disabled></div>
        <div class="field"><label>合同期</label><input value="${fmtTs(e.contract_start)} → ${fmtTs(e.contract_end)}" disabled></div>
      </div>
      ${editable ? `<div class="form-actions">
        <button class="btn primary" onclick="saveProfile()">保存</button>
      </div>` : ''}
    </div>

    <div id="members-section"></div>
  `;
  renderMembers();
}

function renderMembers() {
  const e = state.enterprise;
  const canManage = canManageMembers();
  const canRoles = canChangeRoles();
  document.getElementById('members-section').innerHTML = `
    <div class="card">
      <h2>成员 (${e.members.length})
        ${canManage ? `<button class="btn primary" style="float:right" onclick="openInvite()">+ 邀请成员</button>` : ''}
      </h2>
      ${e.members.length ? `<table>
        <thead><tr><th>成员</th><th>角色</th><th>加入时间</th><th></th></tr></thead>
        <tbody>${e.members.map(m => {
          const isMe = m.user_id === state.me.id;
          const roleControl = canRoles && !isMe
            ? `<select onchange="changeRole('${escapeHtml(m.user_id)}', this.value)">
                 ${['member','admin','owner'].map(r => `<option value="${r}" ${r===m.role?'selected':''}>${r}</option>`).join('')}
               </select>`
            : `<span class="pill role-${m.role}">${m.role}</span>${isMe ? ' <span style="font-size:11px;color:var(--muted)">(您)</span>' : ''}`;
          const removeBtn = canManage && !isMe
            ? `<button class="btn danger" onclick="removeMember('${escapeHtml(m.user_id)}')">移除</button>` : '';
          return `<tr>
            <td><strong>${escapeHtml(m.display_name)}</strong> <span style="color:var(--muted)">@${escapeHtml(m.username)}</span></td>
            <td>${roleControl}</td>
            <td>${fmtTs(m.granted_at)}</td>
            <td class="actions">${removeBtn}</td>
          </tr>`;
        }).join('')}</tbody>
      </table>` : '<div class="empty">尚无成员</div>'}
    </div>
  `;
}

async function saveProfile() {
  const body = {
    legal_name: val('f-legal'), display_name: val('f-display'),
    industry: val('f-industry') || null, region: val('f-region') || null,
    size_tier: val('f-size') || null, tax_id: val('f-tax') || null,
    billing_email: val('f-billing') || null,
  };
  await api(`/api/enterprise/${encodeURIComponent(ENTERPRISE_ID)}`, {
    method: 'PATCH', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  toast('已保存');
  await load();
}

function openInvite() {
  const canMint = canMintOwner();
  showModal(`
    <h3>邀请成员</h3>
    <div class="form-grid">
      <div class="field"><label>Username 或 user_id</label><input id="i-user"></div>
      <div class="field"><label>Role</label>
        <select id="i-role">
          <option value="member">member</option>
          <option value="admin">admin</option>
          ${canMint ? '<option value="owner">owner</option>' : ''}
        </select>
        ${canMint ? '' : '<div class="role-note">仅 owner 可任命另一位 owner。</div>'}
      </div>
    </div>
    <div class="form-actions">
      <button class="btn primary" id="i-save">添加</button>
      <button class="btn" onclick="closeModal()">取消</button>
    </div>
  `);
  document.getElementById('i-save').onclick = async () => {
    await api(`/api/enterprise/${encodeURIComponent(ENTERPRISE_ID)}/members`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: val('i-user'), role: val('i-role') }),
    });
    closeModal(); toast('已添加'); await load();
  };
}

async function changeRole(uid, role) {
  await api(`/api/enterprise/${encodeURIComponent(ENTERPRISE_ID)}/members/${encodeURIComponent(uid)}`, {
    method: 'PATCH', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ role }),
  });
  toast(`角色已改为 ${role}`); await load();
}

async function removeMember(uid) {
  if (!confirm('确认移除该成员?')) return;
  await api(`/api/enterprise/${encodeURIComponent(ENTERPRISE_ID)}/members/${encodeURIComponent(uid)}`,
    { method: 'DELETE' });
  toast('已移除'); await load();
}

load();
</script>
</body>
</html>
