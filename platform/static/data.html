<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>fiveoranges.ai · 数据中心</title>
<style>
  :root {
    --border: #e5e7eb;
    --muted: #6b7280;
    --bg: #fafafa;
    --card: #fff;
    --accent: #1f6feb;
    --warn: #c00;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, "Segoe UI", sans-serif;
    background: var(--bg); color: #111;
    margin: 0; height: 100vh; overflow: hidden;
    display: grid; grid-template-rows: 56px 1fr;
  }
  header {
    background: #fff; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 20px; gap: 16px;
  }
  header h1 { font-size: 16px; font-weight: 600; margin: 0; }
  header .crumb { color: var(--muted); font-size: 13px; }
  header select { font-size: 13px; padding: 4px 8px; border-radius: 4px; border: 1px solid var(--border); }
  header .spacer { flex: 1; }
  header .link { color: var(--muted); font-size: 13px; cursor: pointer; text-decoration: none; }
  header .link:hover { color: #111; }

  main { display: grid; grid-template-columns: 1fr 360px; height: 100%; overflow: hidden; }
  .panels { overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
  .panel {
    background: var(--card); border: 1px solid var(--border); border-radius: 8px;
    padding: 16px;
  }
  .panel h2 { font-size: 14px; font-weight: 600; margin: 0 0 12px 0; color: #374151; }
  .panel h2 .hint { font-weight: normal; color: var(--muted); font-size: 12px; margin-left: 8px; }

  /* Health Panel */
  .health-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; }
  .health-card { border: 1px solid var(--border); border-radius: 6px; padding: 12px; }
  .health-card .name { font-size: 12px; color: var(--muted); }
  .health-card .count { font-size: 22px; font-weight: 600; margin: 4px 0; }
  .health-card .meta { font-size: 11px; color: var(--muted); }
  .health-card .sources { font-size: 11px; margin-top: 6px; color: #374151; }

  /* Table Browser */
  .browser-tabs { display: flex; gap: 4px; margin-bottom: 12px; flex-wrap: wrap; }
  .browser-tabs button {
    background: transparent; border: 1px solid var(--border); padding: 4px 10px;
    border-radius: 4px; cursor: pointer; font-size: 12px; color: #374151;
  }
  .browser-tabs button.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .browser-tools { display: flex; gap: 8px; margin-bottom: 8px; }
  .browser-tools input[type=search] {
    flex: 1; padding: 6px 10px; border: 1px solid var(--border); border-radius: 4px; font-size: 13px;
  }
  .browser-meta { font-size: 12px; color: var(--muted); margin-top: 8px; }
  .table-wrap { overflow: auto; max-height: 360px; border: 1px solid var(--border); border-radius: 4px; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th, td { padding: 6px 10px; text-align: left; border-bottom: 1px solid var(--border); white-space: nowrap; }
  th { background: #f9fafb; font-weight: 600; position: sticky; top: 0; }
  td { color: #374151; }
  td.null { color: #9ca3af; font-style: italic; }
  .pager { display: flex; gap: 8px; align-items: center; margin-top: 8px; font-size: 12px; }
  .pager button { background: #fff; border: 1px solid var(--border); padding: 4px 10px; border-radius: 4px; cursor: pointer; }
  .pager button:disabled { opacity: 0.4; cursor: default; }

  /* Bronze Files */
  .bronze-filters { margin-bottom: 8px; display: flex; gap: 4px; flex-wrap: wrap; }
  .bronze-filters button {
    background: transparent; border: 1px solid var(--border); padding: 3px 8px;
    border-radius: 4px; cursor: pointer; font-size: 11px;
  }
  .bronze-filters button.active { background: #374151; color: #fff; border-color: #374151; }

  .empty { color: var(--muted); font-size: 12px; padding: 12px; text-align: center; }
  .uninit-banner { background: #fef3c7; border: 1px solid #fcd34d; padding: 10px 14px; border-radius: 6px; font-size: 13px; color: #92400e; }

  /* Assistant Sidebar */
  aside {
    background: #fff; border-left: 1px solid var(--border);
    display: flex; flex-direction: column; height: 100%;
  }
  aside header { display: flex; align-items: center; padding: 12px 16px; border-bottom: 1px solid var(--border); height: auto; }
  aside header .title { font-size: 13px; font-weight: 600; }
  .chat-body { flex: 1; overflow-y: auto; padding: 16px; }
  .stub { background: var(--bg); border: 1px dashed var(--border); border-radius: 8px; padding: 16px; }
  .stub h3 { font-size: 13px; margin: 0 0 8px 0; }
  .stub p { font-size: 12px; color: var(--muted); margin: 0 0 8px 0; line-height: 1.5; }
  .stub ul { margin: 8px 0 0 0; padding-left: 20px; font-size: 12px; color: #374151; }
  .stub li { margin-bottom: 4px; }
  .stub .badge { display: inline-block; background: #fde68a; color: #92400e; font-size: 10px; padding: 2px 6px; border-radius: 3px; margin-left: 6px; vertical-align: 1px; }
  .composer {
    border-top: 1px solid var(--border); padding: 12px; display: flex; gap: 8px;
  }
  .composer textarea {
    flex: 1; resize: none; height: 60px; padding: 8px; border: 1px solid var(--border);
    border-radius: 4px; font-family: inherit; font-size: 13px;
  }
  .composer textarea:disabled { background: #f3f4f6; color: #9ca3af; }
  .composer button {
    padding: 0 14px; border-radius: 4px; border: 1px solid var(--accent);
    background: var(--accent); color: #fff; cursor: pointer; font-size: 13px;
  }
  .composer button:disabled { background: #f3f4f6; color: #9ca3af; border-color: var(--border); cursor: not-allowed; }

  /* Chat bubbles */
  .msg { margin-bottom: 12px; font-size: 13px; line-height: 1.5; }
  .msg.user { text-align: right; }
  .msg.user .bubble { background: var(--accent); color: #fff; }
  .msg.assistant .bubble { background: #f3f4f6; color: #111; }
  .msg .bubble {
    display: inline-block; padding: 8px 12px; border-radius: 8px;
    max-width: 90%; text-align: left; white-space: pre-wrap; word-break: break-word;
  }
  .msg .meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .tool-call {
    font-size: 11px; color: var(--muted); padding: 4px 8px; margin: 4px 0;
    background: #fafafa; border-left: 2px solid var(--border);
  }
  .tool-call.error { color: var(--warn); border-left-color: var(--warn); }
  .pending { color: var(--muted); font-style: italic; font-size: 12px; padding: 4px 0; }
  .stub {
    background: var(--bg); border: 1px dashed var(--border);
    border-radius: 8px; padding: 14px; font-size: 12px; color: var(--muted);
  }
  .stub h3 { margin: 0 0 6px 0; font-size: 13px; color: #111; }
</style>
</head>
<body>

<header>
  <h1>数据中心</h1>
  <span class="crumb">/</span>
  <select id="client-switcher"></select>
  <div class="spacer"></div>
  <a class="link" href="/">← 返回 Agent 列表</a>
  <a class="link" href="javascript:logout()">退出</a>
</header>

<main>
  <div class="panels">
    <div id="uninit" class="uninit-banner" style="display:none">
      该租户的 silver 数据库还未初始化 — 通过侧栏 <strong>导入助手</strong>(M3+ 接通)上传第一批数据后即可看到内容。
    </div>

    <section class="panel">
      <h2>Silver 数据健康 <span class="hint">— 5 张 canonical 表</span></h2>
      <div id="health" class="health-grid"></div>
    </section>

    <section class="panel">
      <h2>表浏览 <span class="hint">— 只读;不暴露 SQL</span></h2>
      <div id="browser-tabs" class="browser-tabs"></div>
      <div class="browser-tools">
        <input type="search" id="browser-q" placeholder="按字符串字段搜索...">
      </div>
      <div id="browser-meta" class="browser-meta"></div>
      <div class="table-wrap"><table id="browser-table"><thead></thead><tbody></tbody></table></div>
      <div class="pager">
        <button id="prev">上一页</button>
        <button id="next">下一页</button>
        <span id="page-info"></span>
      </div>
    </section>

    <section class="panel">
      <h2>Bronze 文件 <span class="hint">— 原始落地清单</span></h2>
      <div id="bronze-filters" class="bronze-filters"></div>
      <div class="table-wrap">
        <table id="bronze-table">
          <thead><tr>
            <th>来源</th><th>原始文件</th><th>Sheet</th>
            <th>行数</th><th>上传人</th><th>时间</th>
          </tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </div>

  <aside>
    <header><span class="title" id="asst-title">导入助手</span></header>
    <div class="chat-body" id="chat-body"></div>
    <div class="composer">
      <textarea id="composer-input" placeholder="向助手提问或描述要做什么..."></textarea>
      <button id="composer-send">发送</button>
    </div>
  </aside>
</main>

<script>
const state = {
  client: null,
  table: null,
  offset: 0,
  limit: 50,
  q: '',
  bronzeFilter: null,
};
const SOURCE_TYPES = ['erp_kingdee','erp_yongyou','file_excel','file_pdf','manual_ui'];

async function api(path) {
  const r = await fetch(path, { credentials: 'same-origin' });
  if (r.status === 401) { location.href = '/'; throw new Error('unauth'); }
  if (!r.ok) throw new Error(`${path} -> ${r.status}`);
  return r.json();
}

async function logout() {
  await fetch('/auth/logout', { method: 'POST', credentials: 'same-origin' });
  location.href = '/';
}

function fmtTs(unix) {
  if (!unix) return '—';
  return new Date(unix * 1000).toLocaleString('zh-CN');
}
function fmtIso(s) { return s ? new Date(s).toLocaleString('zh-CN') : '—'; }

// ─── Health Panel ──────────────────────────────────────────────
async function renderHealth() {
  const data = await api(`/api/data/health?client=${encodeURIComponent(state.client)}`);
  document.getElementById('uninit').style.display = data.initialized ? 'none' : 'block';
  const grid = document.getElementById('health');
  grid.innerHTML = Object.entries(data.tables).map(([name, t]) => {
    const sources = Object.entries(t.by_source).map(([k,v]) => `${k}: ${v}`).join(' · ') || '—';
    return `
      <div class="health-card">
        <div class="name">${name}</div>
        <div class="count">${t.row_count.toLocaleString()}</div>
        <div class="meta">最近更新: ${fmtIso(t.latest_updated_at)}</div>
        <div class="sources">${sources}</div>
      </div>`;
  }).join('');
}

// ─── Table Browser ─────────────────────────────────────────────
async function renderBrowserTabs() {
  const data = await api(`/api/data/health?client=${encodeURIComponent(state.client)}`);
  const tables = Object.keys(data.tables);
  state.table = state.table || tables[0];
  document.getElementById('browser-tabs').innerHTML = tables.map(t =>
    `<button data-table="${t}" class="${t === state.table ? 'active' : ''}">${t}</button>`
  ).join('');
  document.querySelectorAll('#browser-tabs button').forEach(b =>
    b.onclick = () => { state.table = b.dataset.table; state.offset = 0; renderBrowser(); }
  );
}
async function renderBrowser() {
  await renderBrowserTabs();
  const url = `/api/data/tables/${state.table}/rows?client=${encodeURIComponent(state.client)}`
    + `&limit=${state.limit}&offset=${state.offset}`
    + (state.q ? `&q=${encodeURIComponent(state.q)}` : '');
  const data = await api(url);
  const thead = document.querySelector('#browser-table thead');
  const tbody = document.querySelector('#browser-table tbody');
  thead.innerHTML = `<tr>${data.columns.map(c => `<th>${c}</th>`).join('')}</tr>`;
  tbody.innerHTML = data.rows.length ? data.rows.map(r =>
    `<tr>${data.columns.map(c => {
      const v = r[c];
      return v === null ? `<td class="null">null</td>` : `<td>${escapeHtml(String(v))}</td>`;
    }).join('')}</tr>`
  ).join('') : `<tr><td colspan="${data.columns.length || 1}" class="empty">无数据</td></tr>`;
  document.getElementById('browser-meta').textContent = `共 ${data.total} 行`;
  document.getElementById('prev').disabled = state.offset === 0;
  document.getElementById('next').disabled = state.offset + state.limit >= data.total;
  document.getElementById('page-info').textContent =
    data.total === 0 ? '' : `${state.offset + 1}-${Math.min(state.offset + state.limit, data.total)}`;
}
function escapeHtml(s) {
  return s.replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}

// ─── Bronze Files ──────────────────────────────────────────────
async function renderBronze() {
  const filterRow = document.getElementById('bronze-filters');
  filterRow.innerHTML = ['全部', ...SOURCE_TYPES].map(s => {
    const value = s === '全部' ? null : s;
    const active = state.bronzeFilter === value ? 'active' : '';
    return `<button data-src="${value || ''}" class="${active}">${s}</button>`;
  }).join('');
  filterRow.querySelectorAll('button').forEach(b =>
    b.onclick = () => { state.bronzeFilter = b.dataset.src || null; renderBronze(); }
  );

  const url = `/api/data/bronze?client=${encodeURIComponent(state.client)}`
    + (state.bronzeFilter ? `&source_type=${state.bronzeFilter}` : '');
  const data = await api(url);
  const tbody = document.querySelector('#bronze-table tbody');
  tbody.innerHTML = data.files.length ? data.files.map(f => `
    <tr>
      <td>${f.source_type}</td>
      <td>${f.original_filename || '—'}</td>
      <td>${f.sheet_name || '—'}</td>
      <td>${f.row_count.toLocaleString()}</td>
      <td>${f.uploaded_by || '—'}</td>
      <td>${fmtTs(f.ingested_at)}</td>
    </tr>`).join('')
    : '<tr><td colspan="6" class="empty">尚无 bronze 文件 — 通过侧栏助手上传</td></tr>';
}

// ─── Assistant chat ────────────────────────────────────────────
const chatState = { history: [], pending: false, enabled: false };

async function checkAssistantStatus() {
  try {
    const s = await api('/api/data/assistant/status');
    chatState.enabled = s.enabled;
    document.getElementById('asst-title').textContent =
      s.enabled ? `导入助手 · ${s.model}` : '导入助手 (未配置)';
  } catch { chatState.enabled = false; }
  applyAssistantUI();
}

function applyAssistantUI() {
  const body = document.getElementById('chat-body');
  const input = document.getElementById('composer-input');
  const send = document.getElementById('composer-send');
  if (!chatState.enabled) {
    body.innerHTML = `
      <div class="stub">
        <h3>导入助手未配置</h3>
        ANTHROPIC_API_KEY 未设置,聊天暂不可用。后端配置后刷新即可。<br><br>
        助手启用后将承担:拖文件上传、列映射、手填一条、回答"我数据齐了吗"。
      </div>`;
    input.disabled = true; send.disabled = true;
    return;
  }
  if (!body.innerHTML.trim() || body.querySelector('.stub')) {
    body.innerHTML = `<div class="msg assistant"><div class="bubble">您好。把 Excel 拖到这里,或者直接告诉我您要做什么。<br>
    例如:"我上传了什么?" / "把销售单第一列映射到客户名"。</div></div>`;
  }
  input.disabled = chatState.pending; send.disabled = chatState.pending;
}

function renderChat() {
  const body = document.getElementById('chat-body');
  const renderBlocks = (m) => {
    if (typeof m.content === 'string') return escapeHtml(m.content);
    return m.content.map(b => {
      if (b.type === 'text') return escapeHtml(b.text);
      if (b.type === 'tool_use') return `<div class="tool-call">🔧 ${escapeHtml(b.name)}(${escapeHtml(JSON.stringify(b.input || {}))})</div>`;
      if (b.type === 'tool_result') return ''; // collapse — visible via tool_invocations
      return '';
    }).join('');
  };
  // Skip the first synthetic user message (kickoff context) — show only what user typed
  const visible = chatState.history.filter((m, i) => {
    if (i === 0 && m.role === 'user' && typeof m.content === 'string'
        && m.content.includes('[当前租户状态]')) return false;
    return true;
  });
  body.innerHTML = visible.map(m => {
    const html = renderBlocks(m);
    if (!html.trim()) return '';
    return `<div class="msg ${m.role}"><div class="bubble">${html}</div></div>`;
  }).join('') + (chatState.pending ? '<div class="pending">助手思考中…</div>' : '');
  body.scrollTop = body.scrollHeight;
}

async function sendChat() {
  const input = document.getElementById('composer-input');
  const text = input.value.trim();
  if (!text || chatState.pending) return;
  input.value = '';
  chatState.pending = true;
  // Optimistic: show user msg immediately
  chatState.history.push({ role: 'user', content: text });
  renderChat();
  applyAssistantUI();
  try {
    const r = await fetch('/api/data/assistant/chat', {
      method: 'POST', credentials: 'same-origin',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        client: state.client,
        // Replace optimistic last-user with what server received
        history: chatState.history.slice(0, -1),
        message: text,
      }),
    });
    if (!r.ok) {
      const err = await r.json().catch(() => ({}));
      chatState.history.push({
        role: 'assistant',
        content: [{ type: 'text', text: `(错误: ${err.detail?.message || err.message || r.status})` }],
      });
    } else {
      const body = await r.json();
      chatState.history = body.messages;
    }
  } finally {
    chatState.pending = false;
    renderChat();
    applyAssistantUI();
    // Refresh main panels — the assistant may have changed silver / bronze state
    refresh();
  }
}

// ─── Boot ──────────────────────────────────────────────────────
async function boot() {
  const { clients } = await api('/api/data/clients');
  const sel = document.getElementById('client-switcher');
  if (!clients.length) {
    sel.innerHTML = '<option>(无授权租户)</option>';
    document.querySelector('main').innerHTML =
      '<div class="empty" style="padding:60px">您的账号还没有任何租户授权。</div>';
    return;
  }
  sel.innerHTML = clients.map(c => `<option value="${c}">${c}</option>`).join('');
  state.client = clients[0];
  sel.onchange = () => { state.client = sel.value; state.table = null; state.offset = 0; refresh(); };

  document.getElementById('browser-q').addEventListener('input', e => {
    state.q = e.target.value.trim();
    state.offset = 0;
    renderBrowser();
  });
  document.getElementById('prev').onclick = () => { state.offset = Math.max(0, state.offset - state.limit); renderBrowser(); };
  document.getElementById('next').onclick = () => { state.offset += state.limit; renderBrowser(); };

  // Assistant wiring
  document.getElementById('composer-send').onclick = sendChat;
  document.getElementById('composer-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) { e.preventDefault(); sendChat(); }
  });
  await checkAssistantStatus();

  refresh();
}
async function refresh() {
  await Promise.all([renderHealth(), renderBrowser(), renderBronze()]);
}
boot();
</script>
</body>
</html>
