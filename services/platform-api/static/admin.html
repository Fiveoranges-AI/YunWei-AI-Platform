<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>fiveoranges.ai · 平台管理后台</title>
<style>
  :root {
    --border: #e5e7eb;
    --muted: #6b7280;
    --bg: #f9fafb;
    --card: #fff;
    --accent: #1f6feb;
    --warn: #c00;
    --ok: #1a8c1a;
    --pill-trial: #fef3c7;
    --pill-trial-text: #92400e;
    --pill-standard: #dbeafe;
    --pill-standard-text: #1e40af;
    --pill-enterprise: #dcfce7;
    --pill-enterprise-text: #15803d;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, "Segoe UI", sans-serif;
    background: var(--bg); color: #111;
    margin: 0; height: 100vh; overflow: hidden;
    display: grid; grid-template-rows: 56px 1fr;
  }
  header.nav {
    background: #fff; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 20px; gap: 16px;
  }
  header.nav h1 { font-size: 16px; font-weight: 600; margin: 0; }
  header.nav .badge { background: #fde68a; color: #92400e; font-size: 10px; padding: 2px 6px; border-radius: 3px; margin-left: 6px; }
  header.nav .tabs { display: flex; gap: 4px; margin-left: 24px; }
  header.nav .tabs button {
    background: transparent; border: 0; padding: 6px 12px; font-size: 13px;
    border-radius: 4px; cursor: pointer; color: var(--muted);
  }
  header.nav .tabs button.active { background: #f3f4f6; color: #111; }
  header.nav .spacer { flex: 1; }
  header.nav .link { color: var(--muted); font-size: 13px; cursor: pointer; text-decoration: none; }
  header.nav .link:hover { color: #111; }

  main { display: grid; grid-template-columns: 360px 1fr; height: 100%; overflow: hidden; }

  /* Left list */
  aside.list-pane {
    background: #fff; border-right: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden;
  }
  aside.list-pane .list-head {
    padding: 12px; border-bottom: 1px solid var(--border);
    display: flex; gap: 8px;
  }
  aside.list-pane input[type=search] {
    flex: 1; padding: 6px 10px; border: 1px solid var(--border);
    border-radius: 4px; font-size: 13px;
  }
  aside.list-pane button.new {
    background: var(--accent); color: #fff; border: 0;
    padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 13px;
  }
  .list-body { overflow-y: auto; flex: 1; }
  .list-row {
    padding: 12px 14px; border-bottom: 1px solid var(--border);
    cursor: pointer;
  }
  .list-row:hover { background: var(--bg); }
  .list-row.active { background: #eff6ff; border-left: 3px solid var(--accent); padding-left: 11px; }
  .list-row .name { font-size: 14px; font-weight: 500; }
  .list-row .meta { font-size: 11px; color: var(--muted); margin-top: 4px; display: flex; gap: 12px; }
  .pill {
    display: inline-block; font-size: 10px; padding: 2px 6px; border-radius: 3px;
    font-weight: 500; vertical-align: 1px; margin-left: 6px;
  }
  .pill.trial { background: var(--pill-trial); color: var(--pill-trial-text); }
  .pill.standard { background: var(--pill-standard); color: var(--pill-standard-text); }
  .pill.enterprise { background: var(--pill-enterprise); color: var(--pill-enterprise-text); }
  .pill.inactive { background: #fee2e2; color: var(--warn); }
  .pill.platform-admin { background: #ede9fe; color: #6d28d9; }

  /* Right detail */
  .detail-pane { overflow-y: auto; padding: 24px; }
  .detail-pane h2 { font-size: 18px; font-weight: 600; margin: 0 0 4px 0; }
  .detail-pane .subtitle { font-size: 13px; color: var(--muted); margin-bottom: 20px; }
  .detail-tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
  .detail-tabs button {
    background: transparent; border: 0; padding: 8px 14px; font-size: 13px;
    cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent;
    margin-bottom: -1px;
  }
  .detail-tabs button.active { color: #111; border-bottom-color: var(--accent); }

  .card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 16px; }
  .card h3 { margin: 0 0 16px 0; font-size: 14px; font-weight: 600; color: #374151; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 20px; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .field input, .field select {
    padding: 7px 10px; border: 1px solid var(--border); border-radius: 4px;
    font-size: 13px; background: #fff;
  }
  .field input:disabled, .field select:disabled {
    background: var(--bg); color: var(--muted);
  }
  .field.full { grid-column: 1 / -1; }
  .form-actions { margin-top: 16px; display: flex; gap: 8px; }
  .btn {
    padding: 7px 14px; border: 1px solid var(--border); border-radius: 4px;
    background: #fff; cursor: pointer; font-size: 13px;
  }
  .btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn.danger { color: var(--warn); border-color: #fee2e2; }
  .btn.danger:hover { background: #fee2e2; }
  .btn:disabled { opacity: 0.4; cursor: default; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { padding: 8px 10px; text-align: left; border-bottom: 1px solid var(--border); }
  th { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); font-weight: 500; }
  td .row-actions { display: flex; gap: 6px; }
  td.actions { text-align: right; }

  .empty { color: var(--muted); font-size: 13px; padding: 30px; text-align: center; }
  .toast { position: fixed; bottom: 20px; right: 20px; background: #111; color: #fff; padding: 10px 16px; border-radius: 6px; font-size: 13px; opacity: 0; transition: opacity 0.2s; pointer-events: none; }
  .toast.show { opacity: 1; }
  .toast.error { background: var(--warn); }

  /* Modal */
  .modal-bg {
    position: fixed; inset: 0; background: rgba(0,0,0,0.4);
    display: none; align-items: center; justify-content: center;
  }
  .modal-bg.show { display: flex; }
  .modal {
    background: #fff; border-radius: 8px; padding: 24px;
    width: 420px; max-width: 90vw;
  }
  .modal h3 { margin: 0 0 16px 0; font-size: 15px; }
  .modal .form-grid { grid-template-columns: 1fr; }
</style>
</head>
<body>

<header class="nav">
  <h1>YunWei AI · 平台管理后台 <span class="badge">PLATFORM ADMIN</span></h1>
  <div class="tabs">
    <button data-view="enterprises" class="active">企业</button>
    <button data-view="users">所有用户</button>
  </div>
  <div class="spacer"></div>
  <a class="link" href="/">← 返回首页</a>
  <a class="link" href="javascript:logout()">退出</a>
</header>

<main>
  <aside class="list-pane">
    <div class="list-head">
      <input type="search" id="filter" placeholder="搜索...">
      <button class="new" id="new-btn">+ 新建</button>
    </div>
    <div class="list-body" id="list-body"></div>
  </aside>
  <div class="detail-pane" id="detail">
    <div class="empty">从左侧选择一个条目查看详情</div>
  </div>
</main>

<div class="modal-bg" id="modal-bg">
  <div class="modal" id="modal"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const api = (path, opts={}) => fetch(path, { credentials: 'same-origin', ...opts })
  .then(async r => {
    if (r.status === 401) { location.href = '/'; throw new Error('unauth'); }
    if (r.status === 403) { toast('无权限', true); throw new Error('forbidden'); }
    if (!r.ok) {
      const err = await r.json().catch(() => ({ message: 'request failed' }));
      toast(err.message || err.error || `${r.status}`, true);
      throw new Error(err.error || `${r.status}`);
    }
    return r.json();
  });

const state = { view: 'enterprises', items: [], selectedId: null, filter: '' };

function logout() { fetch('/api/auth/logout', { method: 'POST' }).then(() => location.href = '/'); }
function toast(msg, isErr=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.toggle('error', isErr);
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, ch =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}
function fmtTs(unix) { return unix ? new Date(unix * 1000).toLocaleDateString('zh-CN') : '—'; }
function planPill(plan) { return `<span class="pill ${plan}">${plan}</span>`; }

document.querySelectorAll('header.nav .tabs button').forEach(b =>
  b.onclick = () => { switchView(b.dataset.view); }
);
document.getElementById('filter').addEventListener('input', e => {
  state.filter = e.target.value.toLowerCase().trim();
  renderList();
});
document.getElementById('new-btn').onclick = () => {
  state.view === 'enterprises' ? openNewEnterprise() : openNewUser();
};
document.getElementById('modal-bg').onclick = e => {
  if (e.target.id === 'modal-bg') closeModal();
};

async function switchView(view) {
  state.view = view;
  state.selectedId = null;
  document.querySelectorAll('header.nav .tabs button').forEach(b =>
    b.classList.toggle('active', b.dataset.view === view)
  );
  document.getElementById('filter').value = '';
  state.filter = '';
  document.getElementById('detail').innerHTML =
    '<div class="empty">从左侧选择一个条目查看详情</div>';
  await load();
}

async function load() {
  if (state.view === 'enterprises') {
    state.items = (await api('/api/admin/enterprises')).enterprises;
  } else {
    state.items = (await api('/api/admin/users')).users;
  }
  renderList();
}

function renderList() {
  const container = document.getElementById('list-body');
  const items = state.items.filter(it => {
    if (!state.filter) return true;
    const haystack = state.view === 'enterprises'
      ? `${it.id} ${it.legal_name} ${it.display_name}`
      : `${it.username} ${it.display_name} ${it.email || ''}`;
    return haystack.toLowerCase().includes(state.filter);
  });
  if (!items.length) {
    container.innerHTML = '<div class="empty">无</div>';
    return;
  }
  container.innerHTML = items.map(it => {
    const id = state.view === 'enterprises' ? it.id : it.id;
    const cls = id === state.selectedId ? 'list-row active' : 'list-row';
    if (state.view === 'enterprises') {
      const inactive = it.active ? '' : '<span class="pill inactive">停用</span>';
      return `<div class="${cls}" data-id="${escapeHtml(id)}">
        <div class="name">${escapeHtml(it.display_name)} ${planPill(it.plan)}${inactive}</div>
        <div class="meta">
          <span>id: ${escapeHtml(it.id)}</span>
          <span>成员 ${it.member_count}</span>
          <span>agent ${it.agent_count}</span>
        </div>
      </div>`;
    } else {
      const adminPill = it.is_platform_admin ? '<span class="pill platform-admin">platform admin</span>' : '';
      return `<div class="${cls}" data-id="${escapeHtml(id)}">
        <div class="name">${escapeHtml(it.display_name)} ${adminPill}</div>
        <div class="meta">
          <span>@${escapeHtml(it.username)}</span>
          <span>所属企业 ${it.enterprise_count}</span>
        </div>
      </div>`;
    }
  }).join('');
  container.querySelectorAll('.list-row').forEach(row =>
    row.onclick = () => selectItem(row.dataset.id)
  );
}

async function selectItem(id) {
  state.selectedId = id;
  renderList();
  if (state.view === 'enterprises') {
    const e = await api(`/api/admin/enterprises/${encodeURIComponent(id)}`);
    renderEnterpriseDetail(e);
  } else {
    const u = await api(`/api/admin/users/${encodeURIComponent(id)}`);
    renderUserDetail(u);
  }
}

function renderEnterpriseDetail(e) {
  const detail = document.getElementById('detail');
  detail.innerHTML = `
    <h2>${escapeHtml(e.display_name)} ${planPill(e.plan)}${e.active ? '' : '<span class="pill inactive">停用</span>'}</h2>
    <div class="subtitle">id: <code>${escapeHtml(e.id)}</code> · 创建于 ${fmtTs(e.created_at)} · onboarding=${escapeHtml(e.onboarding_stage)}</div>

    <div class="card">
      <h3>企业资料</h3>
      <div class="form-grid">
        <div class="field"><label>Legal name</label><input id="f-legal" value="${escapeHtml(e.legal_name)}"></div>
        <div class="field"><label>Display name</label><input id="f-display" value="${escapeHtml(e.display_name)}"></div>
        <div class="field"><label>Industry</label><input id="f-industry" value="${escapeHtml(e.industry || '')}"></div>
        <div class="field"><label>Region</label><input id="f-region" value="${escapeHtml(e.region || '')}"></div>
        <div class="field"><label>Size tier</label>
          <select id="f-size">
            ${['','small','medium','large'].map(s => `<option value="${s}" ${s===(e.size_tier||'')?'selected':''}>${s||'(未填)'}</option>`).join('')}
          </select>
        </div>
        <div class="field"><label>Tax ID</label><input id="f-tax" value="${escapeHtml(e.tax_id || '')}"></div>
        <div class="field"><label>Billing email</label><input id="f-billing" value="${escapeHtml(e.billing_email || '')}"></div>
        <div class="field"><label>Plan</label>
          <select id="f-plan">
            ${['trial','standard','enterprise'].map(p => `<option value="${p}" ${p===e.plan?'selected':''}>${p}</option>`).join('')}
          </select>
        </div>
        <div class="field"><label>Onboarding stage</label>
          <select id="f-stage">
            ${['signed_up','configured','active'].map(s => `<option value="${s}" ${s===e.onboarding_stage?'selected':''}>${s}</option>`).join('')}
          </select>
        </div>
        <div class="field"><label>Active</label>
          <select id="f-active">
            <option value="1" ${e.active?'selected':''}>active</option>
            <option value="0" ${!e.active?'selected':''}>inactive</option>
          </select>
        </div>
      </div>
      <div class="form-actions">
        <button class="btn primary" onclick="saveEnterprise('${escapeHtml(e.id)}')">保存</button>
        ${e.active ? `<button class="btn danger" onclick="deactivateEnterprise('${escapeHtml(e.id)}')">停用</button>` : ''}
      </div>
    </div>

    <div class="card">
      <h3>企业成员 (${e.members.length}) <button class="btn primary" style="float:right" onclick="openAddMember('${escapeHtml(e.id)}')">+ 添加成员</button></h3>
      ${e.members.length ? `<table>
        <thead><tr><th>用户</th><th>角色</th><th>授权时间</th><th></th></tr></thead>
        <tbody>${e.members.map(m => `
          <tr>
            <td><strong>${escapeHtml(m.display_name)}</strong> <span style="color:var(--muted)">@${escapeHtml(m.username)}</span></td>
            <td>
              <select onchange="changeMemberRole('${escapeHtml(e.id)}', '${escapeHtml(m.user_id)}', this.value)">
                ${['member','admin','owner'].map(r => `<option value="${r}" ${r===m.role?'selected':''}>${r}</option>`).join('')}
              </select>
            </td>
            <td>${fmtTs(m.granted_at)}</td>
            <td class="actions"><button class="btn danger" onclick="removeMember('${escapeHtml(e.id)}', '${escapeHtml(m.user_id)}')">移除</button></td>
          </tr>`).join('')}</tbody>
      </table>` : '<div class="empty">尚无成员</div>'}
    </div>

    <div class="card">
      <h3>Agents (${e.agents.length})</h3>
      ${e.agents.length ? `<table>
        <thead><tr><th>agent_id</th><th>显示名</th><th>容器 URL</th><th>health</th></tr></thead>
        <tbody>${e.agents.map(a => `
          <tr><td><code>${escapeHtml(a.agent_id)}</code></td>
              <td>${escapeHtml(a.display_name)}</td>
              <td><code style="font-size:11px">${escapeHtml(a.container_url)}</code></td>
              <td>${escapeHtml(a.health || 'unknown')}</td></tr>`).join('')}</tbody>
      </table>` : '<div class="empty">尚无 agent — 通过 platform-admin add-tenant CLI 部署</div>'}
    </div>

    <div class="card">
      <h3>Agent 例外授权 (${e.agent_grants.length}) <button class="btn primary" style="float:right" onclick="openAddGrant('${escapeHtml(e.id)}')">+ 添加</button></h3>
      <div style="font-size:12px;color:var(--muted);margin-bottom:8px">非企业成员的单 agent 授权(外部顾问 / 临时账号)。</div>
      ${e.agent_grants.length ? `<table>
        <thead><tr><th>用户</th><th>agent</th><th>角色</th><th></th></tr></thead>
        <tbody>${e.agent_grants.map(g => `
          <tr><td><strong>${escapeHtml(g.display_name)}</strong> <span style="color:var(--muted)">@${escapeHtml(g.username)}</span></td>
              <td><code>${escapeHtml(g.agent_id)}</code></td>
              <td>${escapeHtml(g.role)}</td>
              <td class="actions"><button class="btn danger" onclick="removeGrant('${escapeHtml(e.id)}','${escapeHtml(g.user_id)}','${escapeHtml(g.agent_id)}')">撤销</button></td>
          </tr>`).join('')}</tbody>
      </table>` : '<div class="empty">无</div>'}
    </div>
  `;
}

async function saveEnterprise(eid) {
  const body = {
    legal_name: val('f-legal'), display_name: val('f-display'),
    industry: val('f-industry') || null, region: val('f-region') || null,
    size_tier: val('f-size') || null, tax_id: val('f-tax') || null,
    billing_email: val('f-billing') || null,
    plan: val('f-plan'), onboarding_stage: val('f-stage'),
    active: parseInt(val('f-active'), 10),
  };
  await api(`/api/admin/enterprises/${encodeURIComponent(eid)}`, {
    method: 'PATCH', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  toast('已保存');
  await load();
  await selectItem(eid);
}
async function deactivateEnterprise(eid) {
  if (!confirm(`停用企业 ${eid}?`)) return;
  await api(`/api/admin/enterprises/${encodeURIComponent(eid)}`, { method: 'DELETE' });
  toast('已停用');
  await load();
  await selectItem(eid);
}

function openAddMember(eid) {
  showModal(`
    <h3>添加成员到 ${escapeHtml(eid)}</h3>
    <div class="form-grid">
      <div class="field"><label>Username 或 user_id</label><input id="m-user"></div>
      <div class="field"><label>Role</label>
        <select id="m-role">
          <option value="member">member</option>
          <option value="admin">admin</option>
          <option value="owner">owner</option>
        </select>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn primary" id="m-save">添加</button>
      <button class="btn" onclick="closeModal()">取消</button>
    </div>
  `);
  document.getElementById('m-save').onclick = async () => {
    await api(`/api/admin/enterprises/${encodeURIComponent(eid)}/members`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: val('m-user'), role: val('m-role') }),
    });
    closeModal(); toast('已添加'); selectItem(eid);
  };
}

async function changeMemberRole(eid, uid, role) {
  await api(`/api/admin/enterprises/${encodeURIComponent(eid)}/members/${encodeURIComponent(uid)}`, {
    method: 'PATCH', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ role }),
  });
  toast(`角色已改为 ${role}`);
}

async function removeMember(eid, uid) {
  if (!confirm('移除此成员?')) return;
  await api(`/api/admin/enterprises/${encodeURIComponent(eid)}/members/${encodeURIComponent(uid)}`,
    { method: 'DELETE' });
  toast('已移除'); selectItem(eid);
}

function openAddGrant(eid) {
  showModal(`
    <h3>添加 Agent 例外授权</h3>
    <div class="form-grid">
      <div class="field"><label>Username 或 user_id</label><input id="g-user"></div>
      <div class="field"><label>Agent ID</label><input id="g-agent"></div>
    </div>
    <div class="form-actions">
      <button class="btn primary" id="g-save">添加</button>
      <button class="btn" onclick="closeModal()">取消</button>
    </div>
  `);
  document.getElementById('g-save').onclick = async () => {
    await api(`/api/admin/enterprises/${encodeURIComponent(eid)}/agent-grants`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: val('g-user'), agent_id: val('g-agent') }),
    });
    closeModal(); toast('已授权'); selectItem(eid);
  };
}
async function removeGrant(eid, uid, aid) {
  if (!confirm('撤销此授权?')) return;
  await api(`/api/admin/enterprises/${encodeURIComponent(eid)}/agent-grants/${encodeURIComponent(uid)}/${encodeURIComponent(aid)}`,
    { method: 'DELETE' });
  toast('已撤销'); selectItem(eid);
}

function openNewEnterprise() {
  showModal(`
    <h3>新建企业</h3>
    <div class="form-grid">
      <div class="field"><label>id (= client_id)</label><input id="ne-id" placeholder="yinhu"></div>
      <div class="field"><label>Legal name</label><input id="ne-legal"></div>
      <div class="field"><label>Display name</label><input id="ne-display"></div>
      <div class="field"><label>Industry</label><input id="ne-industry"></div>
      <div class="field"><label>Plan</label>
        <select id="ne-plan"><option value="trial">trial</option><option>standard</option><option>enterprise</option></select>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn primary" id="ne-save">创建</button>
      <button class="btn" onclick="closeModal()">取消</button>
    </div>
  `);
  document.getElementById('ne-save').onclick = async () => {
    const r = await api('/api/admin/enterprises', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        id: val('ne-id'), legal_name: val('ne-legal') || undefined,
        display_name: val('ne-display') || undefined,
        industry: val('ne-industry') || undefined, plan: val('ne-plan'),
      }),
    });
    closeModal(); toast('已创建'); await load(); selectItem(r.id);
  };
}

function renderUserDetail(u) {
  const detail = document.getElementById('detail');
  detail.innerHTML = `
    <h2>${escapeHtml(u.display_name)} ${u.is_platform_admin ? '<span class="pill platform-admin">platform admin</span>' : ''}</h2>
    <div class="subtitle">@${escapeHtml(u.username)} · 创建于 ${fmtTs(u.created_at)} · 上次登录 ${fmtTs(u.last_login)}</div>

    <div class="card">
      <h3>账号属性</h3>
      <div class="form-grid">
        <div class="field"><label>user_id</label><input value="${escapeHtml(u.id)}" disabled></div>
        <div class="field"><label>email</label><input value="${escapeHtml(u.email || '')}" disabled></div>
      </div>
      <div class="form-actions">
        <button class="btn ${u.is_platform_admin ? 'danger' : 'primary'}"
                onclick="togglePlatformAdmin('${escapeHtml(u.id)}', ${u.is_platform_admin ? 'false' : 'true'})">
          ${u.is_platform_admin ? '撤销 platform admin' : '提升为 platform admin'}
        </button>
      </div>
    </div>

    <div class="card">
      <h3>所属企业 (${u.memberships.length})</h3>
      ${u.memberships.length ? `<table>
        <thead><tr><th>企业</th><th>角色</th><th>加入时间</th></tr></thead>
        <tbody>${u.memberships.map(m => `
          <tr><td><a href="javascript:void(0)" onclick="switchView('enterprises').then(()=>selectItem('${escapeHtml(m.enterprise_id)}'))">${escapeHtml(m.enterprise_display_name)}</a></td>
              <td>${escapeHtml(m.role)}</td>
              <td>${fmtTs(m.granted_at)}</td></tr>`).join('')}</tbody>
      </table>` : '<div class="empty">该用户不属于任何企业</div>'}
    </div>
  `;
}

async function togglePlatformAdmin(uid, value) {
  await api(`/api/admin/users/${encodeURIComponent(uid)}/admin`, {
    method: 'PATCH', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ is_platform_admin: value }),
  });
  toast(value ? '已提升' : '已撤销');
  await load(); selectItem(uid);
}

function openNewUser() {
  showModal(`
    <h3>新建用户</h3>
    <div class="form-grid">
      <div class="field"><label>Username</label><input id="nu-user"></div>
      <div class="field"><label>Display name</label><input id="nu-display"></div>
      <div class="field"><label>Password</label><input id="nu-pw" type="password"></div>
      <div class="field"><label>Email</label><input id="nu-email"></div>
    </div>
    <div class="form-actions">
      <button class="btn primary" id="nu-save">创建</button>
      <button class="btn" onclick="closeModal()">取消</button>
    </div>
  `);
  document.getElementById('nu-save').onclick = async () => {
    const r = await api('/api/admin/users', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: val('nu-user'), password: val('nu-pw'),
        display_name: val('nu-display'), email: val('nu-email') || undefined,
      }),
    });
    closeModal(); toast('已创建'); await load(); selectItem(r.id);
  };
}

function val(id) { return document.getElementById(id).value; }
function showModal(html) {
  document.getElementById('modal').innerHTML = html;
  document.getElementById('modal-bg').classList.add('show');
}
function closeModal() { document.getElementById('modal-bg').classList.remove('show'); }

async function boot() {
  const me = await api('/api/me');
  if (!me.is_platform_admin) {
    document.body.innerHTML = '<div style="padding:60px;text-align:center;font-family:-apple-system">您没有平台管理员权限。<a href="/">返回</a></div>';
    return;
  }
  await load();
}
boot();
</script>
</body>
</html>
