services:
  platform-app:
    build: ../platform
    container_name: platform-app
    restart: unless-stopped
    env_file: ../.env
    environment:
      PLATFORM_DB_PATH: /data/platform.db
      PROXY_LOG_DB_PATH: /data/proxy_log.db
    volumes:
      - ../data:/data
    networks:
      - cf-tunnel
    expose:
      - "80"
    command: uvicorn platform_app.main:app --host 0.0.0.0 --port 80 --workers 1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost/').status"]
      interval: 30s
      timeout: 5s
      retries: 3

  agent-yinhu-super-xiaochen:
    build: /Users/eason/yunwei-workspaces/yinhu-rebuild/generated
    container_name: agent-yinhu-super-xiaochen
    restart: unless-stopped
    env_file:
      - ../agents/yinhu-super-xiaochen/.env
    volumes:
      - /Users/eason/yunwei-workspaces/yinhu-rebuild/.yunwei-cache/canary:/data
    networks:
      - cf-tunnel
    expose:
      - "8000"

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    # token mode: no config.yml mounted; routes configured in CF dashboard.
    # cloudflared reads TUNNEL_TOKEN from env (injected via env_file at
    # runtime), avoiding compose-level ${VAR} interpolation that needs the
    # .env file to be in compose's "project directory" (= ops/, not us).
    env_file: ../.env
    command: tunnel --no-autoupdate run
    networks:
      - cf-tunnel
    depends_on:
      - platform-app

networks:
  cf-tunnel:
    name: cf-tunnel
